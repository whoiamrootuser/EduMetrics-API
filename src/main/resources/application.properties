# ===================================================================
#  EduMetrics API - Configuracao principal
# ===================================================================

spring.application.name=edumetrics-api
server.port=8080

# -- Banco de dados (H2 em memoria) ---------------------------------
spring.datasource.url=jdbc:h2:mem:edumetrics;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
# true apenas para depurar o problema N+1
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# -- Redis ----------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# -- Cache ----------------------------------------------------------
spring.cache.type=redis
# 5 minutos em milissegundos
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false

# -- RabbitMQ -------------------------------------------------------
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
# Reentrega: ate 3 tentativas; ao esgotar, a mensagem vai para a DLQ
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# -- Rate Limiter (Sliding Window) ----------------------------------
rate.limiter.max-requisicoes=100
rate.limiter.janela-ms=60000

# -- Actuator (health de Redis e RabbitMQ) --------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# -- OpenAPI / Swagger UI -------------------------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# -- Logs -----------------------------------------------------------
logging.level.br.edu.iftm=DEBUG
# ver cache hits/misses no log
logging.level.org.springframework.cache=TRACE
