# ===================================================================
#  EduMetrics API - Configuracao principal
# ===================================================================

spring.application.name=edumetrics-api
server.port=${SERVER_PORT:8080}

# -- Banco de dados (H2 em memoria) ---------------------------------
spring.datasource.url=${DB_URL:jdbc:h2:mem:edumetrics;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${H2_CONSOLE_PATH:/h2-console}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.jpa.open-in-view=false
# true apenas para depurar o problema N+1
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# -- Redis ----------------------------------------------------------
spring.data.redis.url=${REDIS_URL:}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USER:}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000ms}

# -- Cache ----------------------------------------------------------
spring.cache.type=${CACHE_TYPE:redis}
# 5 minutos em milissegundos
spring.cache.redis.time-to-live=${CACHE_TTL_MS:300000}
spring.cache.redis.cache-null-values=${CACHE_NULL_VALUES:false}

# -- RabbitMQ -------------------------------------------------------
spring.rabbitmq.host=${RABBIT_HOST:localhost}
spring.rabbitmq.port=${RABBIT_PORT:5672}
spring.rabbitmq.username=${RABBIT_USER:guest}
spring.rabbitmq.password=${RABBIT_PASSWORD:guest}
# Reentrega: ate 3 tentativas; ao esgotar, a mensagem vai para a DLQ
spring.rabbitmq.listener.simple.retry.enabled=${RABBIT_RETRY_ENABLED:true}
spring.rabbitmq.listener.simple.retry.max-attempts=${RABBIT_RETRY_MAX_ATTEMPTS:3}
spring.rabbitmq.listener.simple.retry.initial-interval=${RABBIT_RETRY_INITIAL_INTERVAL_MS:2000}
spring.rabbitmq.listener.simple.default-requeue-rejected=${RABBIT_DEFAULT_REQUEUE_REJECTED:false}

# -- Rate Limiter (Sliding Window) ----------------------------------
rate.limiter.max-requisicoes=${RATE_LIMIT_MAX_REQUISICOES:100}
rate.limiter.janela-ms=${RATE_LIMIT_JANELA_MS:60000}

# -- Actuator (health de Redis e RabbitMQ) --------------------------
management.endpoints.web.exposure.include=${ACTUATOR_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.show-details=${ACTUATOR_HEALTH_SHOW_DETAILS:always}

# -- OpenAPI / Swagger UI -------------------------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# -- Logs -----------------------------------------------------------
logging.level.br.edu.iftm=${APP_LOG_LEVEL:DEBUG}
# ver cache hits/misses no log
logging.level.org.springframework.cache=${SPRING_CACHE_LOG_LEVEL:TRACE}
