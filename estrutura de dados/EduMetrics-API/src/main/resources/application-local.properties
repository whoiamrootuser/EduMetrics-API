# ===================================================================
#  Perfil "local" -- roda a aplicacao SEM Docker (sem Redis e sem RabbitMQ)
# ===================================================================
#  Uso:
#    mvnw.cmd spring-boot:run "-Dspring-boot.run.profiles=local"
#  ou, com o jar:
#    java -jar target/edumetrics-api.jar --spring.profiles.active=local
#
#  Nesse modo: cache fica em memoria (funciona, inclusive o "cache hit"),
#  os endpoints de aluno/disciplina/desempenho/ranking funcionam normalmente,
#  e POST /api/relatorios responde 202 com o envio ao RabbitMQ apenas SIMULADO.
#  Para a demo oficial (Redis + RabbitMQ reais), use "docker compose up -d".
# ===================================================================

# Cache em memoria (ConcurrentMapCache) em vez de Redis
spring.cache.type=simple

# Nao sobe os listeners do RabbitMQ -> sem tentativas de conexao no startup
spring.rabbitmq.listener.simple.auto-startup=false

# O producer nao publica no broker -> relatorios sao simulados/logados
edumetrics.mensageria.habilitada=false
