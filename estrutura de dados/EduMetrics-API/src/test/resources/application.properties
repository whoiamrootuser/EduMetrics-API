# ===================================================================
#  Perfil de TESTE - roda sem Docker (Redis/RabbitMQ nao precisam estar de pe)
# ===================================================================

# H2 em memoria (igual ao dev)
spring.datasource.url=jdbc:h2:mem:edumetrics-test;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop

# Cache em memoria (ConcurrentMapCache) - nao requer Redis no CI/testes
spring.cache.type=simple

# Os listeners do RabbitMQ NAO sobem no contexto de teste -> nenhuma
# conexao com broker e tentada durante o contextLoads().
spring.rabbitmq.listener.simple.auto-startup=false

# Conexao Redis/Rabbit permanece lazy; nada conecta no startup do teste.
logging.level.org.springframework.cache=INFO
